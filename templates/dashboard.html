<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-900 text-white">

<div class="flex h-screen">

  <!-- Sidebar -->
  <div class="w-20 bg-black flex flex-col items-center py-6 space-y-6">
    <div class="text-2xl">☁️</div>
    <div class="bg-blue-600 p-3 rounded">🏠</div>
    <div>📦</div>
    <div>🖼️</div>
    <div>🎥</div>
  </div>

  <!-- Main -->
  <div class="flex-1 p-8">

    <!-- Header -->
    <div class="flex justify-between mb-6">
      <h1 class="text-2xl">Hey {{ username }} 👋</h1>
      <a href="/logout" class="text-red-400">Logout</a>
    </div>

    <!-- Add Note -->
    <div class="bg-gray-800 p-6 rounded mb-6">
      <form action="/add" method="POST" enctype="multipart/form-data">

        <textarea name="content" class="w-full p-3 text-black rounded" placeholder="Write note..."></textarea>

        <input type="file" name="file" class="mt-3">

        <button class="mt-3 bg-blue-600 px-4 py-2 rounded">
          Add Note
        </button>

      </form>
    </div>

    <!-- Notes -->
    <div class="bg-gray-800 p-6 rounded">

      {% for note in notes %}
        <div class="bg-gray-700 p-3 rounded mb-3">
          <p>{{ note[2] }}</p>

          {% if note[3] %}
            <a href="{{ note[3] }}" target="_blank" class="text-blue-400">View File</a>
          {% endif %}
        </div>
      {% endfor %}

    </div>

  </div>

</div>

</body>
</html>
