<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 flex items-center justify-center min-h-screen">

<div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl w-96">

    <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">
        👤 Your Profile
    </h2>

    <form method="POST" action="/update_profile" class="space-y-4">

        <input type="text" name="username" value="{{ user[0] }}"
            class="w-full p-3 rounded-lg border dark:bg-gray-700 dark:text-white">

        <input type="email" name="email" value="{{ user[1] }}"
            class="w-full p-3 rounded-lg border dark:bg-gray-700 dark:text-white">

        <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            💾 Save Changes
        </button>
    </form>

    <a href="/dashboard"
        class="block text-center mt-4 text-blue-500 hover:underline">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
